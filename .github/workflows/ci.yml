name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # PySide6 needs these shared libraries even under the offscreen platform.
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 binutils

      - name: Install package (with dev tools)
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type check)
        run: mypy

      - name: Bandit (security)
        run: bandit -c pyproject.toml -r objdump_gui

      - name: Pytest
        run: pytest
        env:
          QT_QPA_PLATFORM: offscreen
